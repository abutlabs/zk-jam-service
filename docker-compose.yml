# Run zk-jam-service (anonymous voting) end to end, one command, NO lasair source:
#
#   docker compose up --build
#   # then open http://localhost:3000/vote   (service id 1729)
#
# The JAM node is pulled as a published MULTI-ARCH image (ghcr.io/abutlabs/lasair-node),
# so this runs natively on amd64 AND arm64 (Apple Silicon) — see README "Run it on
# your architecture". The prover sidecar and web app build from THIS repo's own
# source (no lasair checkout required).
#
# Topology:
#   lasair-node   the JAM client (pulled), hosts the voting service via its operator RPC
#   prover        ZK prover sidecar (built here): GET /prove?voter=N&vote=B -> a proof
#   deploy        one-shot: waits for the node, deploys voting-service.jam -> id 1729
#   web           the Next.js dashboard (built here), JAM_BACKEND=lasair
#
# Want the live 6-validator colour-coded testnet hosting the service instead? Use:
#   docker compose -f docker-compose.testnet.yml up --build   (see docs/RUN_FROM_SOURCE.md)
#
# Pin a node version with  LASAIR_NODE_TAG=node-v0.3.0 docker compose up --build

services:
  lasair-node:                          # the JAM client, pulled (not built) — any arch
    image: ghcr.io/abutlabs/lasair-node:${LASAIR_NODE_TAG:-latest}
    ports:
      - "19900:19900"
    restart: unless-stopped

  # the anonymous-voting prover sidecar: GET /prove?voter=N&vote=B -> a ZK proof.
  # Built from THIS repo (circuits/voting). The web app calls it per ballot.
  prover:
    build:
      context: ./circuits/voting
    image: voting-prover:local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9090/healthz"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 12

  deploy:
    image: node:20-bookworm-slim
    depends_on:
      lasair-node:
        condition: service_healthy
    environment:
      LASAIR_RPC: http://lasair-node:19900
    volumes:
      - ./services/voting/voting-service.jam:/work/voting-service.jam:ro
    # Deploy the voting service; first deploy on a fresh node = service id 1729.
    command:
      - node
      - -e
      - |
        const fs = require('fs');
        const rpc = process.env.LASAIR_RPC;
        (async () => {
          const jam = fs.readFileSync('/work/voting-service.jam').toString('hex');
          const r = await fetch(rpc + '/v1/service', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ jam_hex: jam }),
          });
          const j = await r.json();
          if (!r.ok || j.error) { console.error('deploy failed:', j.error || r.status); process.exit(1); }
          console.log('deployed voting-service -> service_id', j.service_id);
        })().catch((e) => { console.error(e); process.exit(1); });
    restart: "no"

  web:
    build:
      context: ./client/web
    depends_on:
      deploy:
        condition: service_completed_successfully
      prover:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      JAM_BACKEND: lasair
      LASAIR_RPC: http://lasair-node:19900
      PROVER_URL: http://prover:9090
      JAM_SERVICE_ID: "1729"
      NEXT_PUBLIC_JAM_SERVICE_ID: "1729"
    restart: unless-stopped
